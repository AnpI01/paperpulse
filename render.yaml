databases:
  - name: paperpulse-db
    plan: free
    databaseName: paperpulse
    user: paperpulse

services:
  - type: web
    name: paperpulse-api
    runtime: python
    plan: free
    buildCommand: >-
      cd frontend && npm install && npm run build &&
      cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperpulse-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: MY_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: DIGEST_RECIPIENTS
        sync: false
      - key: ARXIV_CATEGORIES
        value: cs.CL,cs.AI,cs.LG,cs.CV,cs.RO
      - key: MAX_PAPERS_PER_RUN
        value: "50"
      - key: DAYS_LOOKBACK
        value: "1"
      - key: ALLOWED_ORIGINS
        value: ""  # Set to your Render service URL, e.g. https://paperpulse-api.onrender.com

  - type: cron
    name: paperpulse-daily-digest
    runtime: python
    schedule: "0 8 * * *"  # 8 AM UTC daily
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && python -m app.services.pipeline
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperpulse-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: MY_EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: DIGEST_RECIPIENTS
        sync: false
